<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Y-Bus Calculator | SmartGrid Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f0f4f8;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;--primary:#1d4ed8;--teal:#0891b2;--text:#0f172a;--text2:#334155;--muted:#64748b;--success:#16a34a;--err:#dc2626;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(15,23,42,0.06);}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo{width:36px;height:36px;background:linear-gradient(135deg,#1d4ed8,#0891b2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.brand-name{font-size:1.05rem;font-weight:700;color:var(--text);}
.nav-links{display:flex;gap:4px;}
.nav-links a{padding:7px 14px;border-radius:7px;text-decoration:none;font-size:0.85rem;font-weight:500;color:var(--text2);transition:all 0.2s;}
.nav-links a:hover,.nav-links a.active{background:rgba(29,78,216,0.08);color:var(--primary);}
.container{max-width:1060px;margin:0 auto;padding:2rem;}
.crumb{font-size:0.78rem;color:var(--muted);margin-bottom:0.5rem;}
.crumb a{color:var(--primary);text-decoration:none;}
h1{font-size:1.7rem;font-weight:800;letter-spacing:-0.5px;margin-bottom:0.3rem;}
.sub{color:var(--muted);font-size:0.875rem;margin-bottom:1.8rem;}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start;}
@media(max-width:720px){.layout{grid-template-columns:1fr;}}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:1.6rem;}
.ch{display:flex;align-items:center;gap:9px;margin-bottom:1.2rem;}
.ch-icon{width:34px;height:34px;background:rgba(29,78,216,0.08);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:0.95rem;}
.ch h2{font-size:0.95rem;font-weight:700;}
.ch p{font-size:0.73rem;color:var(--muted);}
table{width:100%;border-collapse:collapse;}
th{font-size:0.68rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:7px 5px;border-bottom:2px solid var(--border);text-align:left;}
td{padding:3px 3px;}
input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;color:var(--text);padding:7px 9px;font-family:'JetBrains Mono',monospace;font-size:0.85rem;outline:none;transition:border-color 0.2s;}
input:focus{border-color:var(--primary);background:#fff;}
.rn{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--muted);text-align:center;padding:0 5px!important;}
.del{background:transparent;border:1.5px solid var(--border);color:var(--muted);border-radius:5px;padding:5px 8px;cursor:pointer;font-size:0.78rem;transition:all 0.2s;}
.del:hover{border-color:var(--err);color:var(--err);}
.btn-row{display:flex;gap:0.7rem;flex-wrap:wrap;margin-top:1.1rem;}
.btn{border:none;border-radius:7px;padding:9px 18px;font-family:'Inter',sans-serif;font-weight:600;font-size:0.85rem;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px;}
.btn-add{background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);}
.btn-add:hover{border-color:var(--primary);color:var(--primary);}
.btn-compute{background:var(--primary);color:#fff;box-shadow:0 3px 10px rgba(29,78,216,0.25);}
.btn-compute:hover{background:#1e3a8a;transform:translateY(-1px);}
.btn-clear{background:transparent;border:1.5px solid var(--border);color:var(--muted);}
.btn-clear:hover{border-color:var(--err);color:var(--err);}
.result-card{display:none;}
.rhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;}
.badge{display:inline-flex;align-items:center;padding:3px 12px;border-radius:999px;font-size:0.72rem;font-weight:600;}
.badge-ok{background:rgba(22,163,74,0.1);color:var(--success);border:1px solid rgba(22,163,74,0.2);}
.mwrap{overflow-x:auto;border-radius:9px;border:1px solid var(--border);}
.mt{border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:0.78rem;width:100%;}
.mt th{background:var(--surface2);color:var(--primary);padding:8px 12px;border:1px solid var(--border);text-align:center;font-size:0.68rem;font-weight:600;}
.mt td{padding:8px 12px;border:1px solid var(--border);text-align:center;color:var(--text2);}
.mt tr:hover td{background:rgba(29,78,216,0.02);}
.mt td.diag{color:var(--primary);font-weight:600;background:rgba(29,78,216,0.04);}
.err{background:rgba(220,38,38,0.06);border:1px solid rgba(220,38,38,0.18);border-radius:7px;padding:10px 14px;color:var(--err);font-size:0.82rem;font-family:'JetBrains Mono',monospace;margin-top:1rem;display:none;}
.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:sp 0.6s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav>
  <a href="/" class="brand"><div class="logo">⚡</div><div class="brand-name">SmartGrid Cloud</div></a>
  <div class="nav-links"><a href="/ybus" class="active">Y-Bus</a><a href="/zbus">Z-Bus</a><a href="/loadflow">Load Flow</a></div>
</nav>
<div class="container">
  <div class="crumb"><a href="/">Home</a> › Y-Bus Calculator</div>
  <h1>⚡ Y-Bus Calculator</h1>
  <p class="sub">Compute the nodal admittance matrix from branch impedance data</p>
  <div class="layout">
    <div class="card">
      <div class="ch"><div class="ch-icon">📋</div><div><h2>Branch Data</h2><p>Enter transmission line parameters (per unit)</p></div></div>
      <table>
        <thead><tr><th>#</th><th>From Bus</th><th>To Bus</th><th>R (pu)</th><th>X (pu)</th><th>B (pu)</th><th></th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="btn-row">
        <button class="btn btn-add" onclick="addRow()">+ Add Branch</button>
        <button class="btn btn-compute" id="cbtn" onclick="compute()"><span id="ct">Compute Y-Bus</span><span id="cs" class="spin" style="display:none;"></span></button>
        <button class="btn btn-clear" onclick="clearAll()">Clear</button>
      </div>
      <div class="err" id="err"></div>
    </div>
    <div class="card result-card" id="rc">
      <div class="rhead">
        <div><h2 style="font-size:0.95rem;font-weight:700;">Y-Bus Matrix</h2><p style="font-size:0.72rem;color:var(--muted);">Nodal Admittance Matrix (pu)</p></div>
        <span class="badge badge-ok" id="badge">✓ Computed</span>
      </div>
      <div class="mwrap" id="mwrap"></div>
    </div>
  </div>
</div>
<script>
let rc=0;
function addRow(){
  rc++;
  const tr=document.createElement('tr');
  tr.id='r'+rc;
  tr.innerHTML=`<td class="rn">${rc}</td>
    <td><input type="number" min="1" placeholder="1"/></td>
    <td><input type="number" min="1" placeholder="2"/></td>
    <td><input type="number" step="any" placeholder="0.02"/></td>
    <td><input type="number" step="any" placeholder="0.06"/></td>
    <td><input type="number" step="any" placeholder="0"/></td>
    <td><button class="del" onclick="document.getElementById('r${rc}').remove()">✕</button></td>`;
  document.getElementById('tbody').appendChild(tr);
}
function clearAll(){document.getElementById('tbody').innerHTML='';rc=0;document.getElementById('rc').style.display='none';document.getElementById('err').style.display='none';}
function showErr(m){const e=document.getElementById('err');e.textContent='⚠ '+m;e.style.display='block';}
function hideErr(){document.getElementById('err').style.display='none';}
function getRows(){
  const rows=document.querySelectorAll('#tbody tr'),b=[];
  for(const r of rows){
    const i=r.querySelectorAll('input');
    const fb=parseInt(i[0].value),tb=parseInt(i[1].value),rv=parseFloat(i[2].value),x=parseFloat(i[3].value),bv=parseFloat(i[4].value)||0;
    if(isNaN(fb)||isNaN(tb)||isNaN(rv)||isNaN(x)){return null;}
    b.push({from_bus:fb,to_bus:tb,r:rv,x,b:bv});
  }
  return b;
}
function buildMatrix(data,n){
  let h='<table class="mt"><thead><tr><th></th>';
  for(let c=1;c<=n;c++)h+=`<th>Bus ${c}</th>`;
  h+='</tr></thead><tbody>';
  for(let r=0;r<n;r++){
    h+=`<tr><th style="background:var(--surface2);color:var(--primary);padding:8px 12px;border:1px solid var(--border);font-size:0.68rem;font-weight:600;">Bus ${r+1}</th>`;
    for(let c=0;c<n;c++)h+=`<td class="${r===c?'diag':''}">${data[r][c]}</td>`;
    h+='</tr>';
  }
  return h+'</tbody></table>';
}
async function compute(){
  hideErr();
  const branches=getRows();
  if(!branches||branches.length===0){showErr('Please add at least one branch with valid values.');return;}
  document.getElementById('ct').textContent='Computing...';
  document.getElementById('cs').style.display='inline-block';
  document.getElementById('cbtn').disabled=true;
  try{
    const res=await fetch('/api/ybus',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({branches})});
    const data=await res.json();
    if(data.error){showErr(data.error);return;}
    document.getElementById('mwrap').innerHTML=buildMatrix(data.ybus,data.n_buses);
    document.getElementById('badge').textContent=`✓ ${data.n_buses}-Bus System`;
    document.getElementById('rc').style.display='block';
    document.getElementById('rc').scrollIntoView({behavior:'smooth',block:'nearest'});
  }catch(e){showErr('Connection error: '+e.message);}
  finally{document.getElementById('ct').textContent='Compute Y-Bus';document.getElementById('cs').style.display='none';document.getElementById('cbtn').disabled=false;}
}
</script>
</body>
</html>
